# One-command deploy for the GURPS bot.
#
#   cp .env.example .env      # set DISCORD_TOKEN + BOT_AUTHOR_LEGAL_NAME
#   docker compose up -d --build
#   docker compose logs -f
#
# The bot only dials out to Discord — no inbound ports to publish.

services:
  gurps-bot:
    build: .
    # To run a prebuilt image instead of building locally, comment out `build:`
    # above and uncomment one of these (both are published by CI):
    # image: ghcr.io/haksanlulz/gudbus:latest
    # image: docker.io/<dockerhub-user>/gudbus:latest
    image: gudbus:latest
    container_name: gurps-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      # SQLite DB + rotating logs. A named volume keeps the non-root container
      # user's write permissions; back it up with deploy/backup-db.sh or
      # `docker compose exec`. For a host-visible path instead, swap this for a
      # bind mount like `./data:/app/data` (ensure the dir is writable by
      # UID 10001, or add `user: "0:0"`).
      - gurps-data:/app/data
    stop_grace_period: 20s

volumes:
  gurps-data:
