name: Tests

# Runs the pytest suite on every PR and on pushes to main, across the min and a
# current supported Python. Vendoring the GCS library (as deploy.sh does) lets
# the reference/library/sync tests run instead of skipping.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Install uv + Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Vendor GCS reference data
        run: uv run python tools/sync_gcs_library.py

      - name: Run tests
        run: uv run python -m pytest -q
