name: Publish Docker image

# Builds the bot image and publishes it to GitHub Container Registry
# (ghcr.io/haksanlulz/gudbus), and to Docker Hub when its credentials are set.
# Runs on pushes to main, on version tags, and on demand.
#
# GHCR needs no setup (uses the built-in GITHUB_TOKEN). To also publish to
# Docker Hub, add two repository secrets:
#   DOCKERHUB_USERNAME — your Docker Hub account/org name
#   DOCKERHUB_TOKEN    — a Docker Hub access token (Account Settings -> Security)
# The image is pushed as docker.io/<DOCKERHUB_USERNAME>/gudbus. Without those
# secrets the Docker Hub steps are skipped and GHCR publishing still runs.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

# Default-deny; the one job re-grants exactly what it needs.
permissions: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # Actions pinned to commit SHAs (tag comment for readability) so a hijacked
      # tag can't inject into a job that holds registry push credentials.
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # Secrets can't be read in `if:` conditions directly, so surface a boolean
      # output the later Docker Hub steps can gate on.
      - name: Detect Docker Hub credentials
        id: dockerhub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DOCKERHUB_USERNAME not set — publishing to GHCR only."
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          # Publish to GHCR always; add Docker Hub only when credentials exist.
          images: |
            ghcr.io/${{ github.repository }}
            name=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/gudbus,enable=${{ steps.dockerhub.outputs.enabled == 'true' }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Supply-chain attestations: SBOM + max-mode build provenance.
          sbom: true
          provenance: mode=max
